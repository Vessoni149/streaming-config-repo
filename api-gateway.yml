server:
  port: 8080
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: users-service-combined-route
          uri: lb://user-service
          predicates:
            - Path=/users/**, /profiles/**
        - id: users-service-lb-test
          uri: lb://user-service
          predicates:
            - Path=/test
management:
  endpoints:
    web:
      exposure:
        include: gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: TRACE
      
