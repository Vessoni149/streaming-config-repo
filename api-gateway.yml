server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: users-service-combined-route
          uri: lb://USER-SERVICE
          predicates:
            # Aquí escuchamos AMBAS rutas en una sola regla
            - Path=/users/**, /profiles/**
          # IMPORTANTE: NO USES StripPrefix aquí. 
          # Deja que el microservicio reciba la ruta completa.
