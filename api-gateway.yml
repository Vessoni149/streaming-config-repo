server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: users-service-route
          uri: lb://user-service  # <--- USAR MINÚSCULAS Y GUION (igual que el name del MS)
          predicates:
            - Path=/users/**, /profiles/**, /test
          filters:
            - StripPrefix=1 # Vamos a usarlo para limpiar la URL
