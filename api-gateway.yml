server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true # Esto permite usar minúsculas en las rutas automáticas
     routes:
        - id: users-service-route
          uri: lb://USER-SERVICE
          predicates:
            - Path=/users/**
          # Sin StripPrefix, el MS recibe "/users/..."

        - id: profiles-service-route
          uri: lb://USER-SERVICE
          predicates:
            - Path=/profiles/**
          # Sin StripPrefix, el MS recibe "/profiles/..."    # Quita la palabra '/users' antes de mandarlo al microservicio
